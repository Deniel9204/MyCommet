on:
  push:
    branches: [main]
  merge_group:
  pull_request:
  workflow_dispatch:

name: benchmark

permissions:
  contents: write
  deployments: write

env:
  PROJECT_PATH: commet
  # Harden the native Rust build against transient crates.io fetch failures
  # (e.g. "failed to get png as a dependency of image") that flake CI.
  CARGO_NET_RETRY: "10"

jobs:
  benchmark:
    name: benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v2
        with:
          submodules: 'true'
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2.8.0
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Setup Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libmpv-dev mpv ffmpeg libmimalloc-dev webkit2gtk-4.1 keybinder-3.0


      - name: Configure Flutter
        run: flutter config --enable-linux-desktop

      - name: Code Generation
        run: |
          cd $PROJECT_PATH
          dart run scripts/codegen.dart
        
      - name: Benchmark
        run: |
          cd $PROJECT_PATH
          export DISPLAY=:99
          sudo Xvfb -ac :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          ffmpeg -f x11grab -video_size 1920x1080 -framerate 15 -i :99 -vcodec libx264 -preset ultrafast -qp 0 -nostdin -loglevel quiet -pix_fmt yuv444p video.mkv &
          flutter drive -d linux --driver=test_driver/benchmark_driver.dart --target=integration_test/benchmark/benchmark.dart --profile
          INTEGRATION_TEST_EXIT_CODE=$?
          sleep 1
          # ffmpeg may have already exited (no display capture), leaving pgrep
          # empty; don't let the cleanup `kill` fail the step after a passing run.
          pkill -x ffmpeg || true
          exit $INTEGRATION_TEST_EXIT_CODE

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result.mkv
          path: commet/video.mkv

      - name: Upload benchmark data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-result
          path: commet/build/customSmallerIsBetter.json

      # Track results in this fork's own gh-pages branch instead of the upstream
      # commetchat/commet_benchmark_results repo, using the auto-provided
      # GITHUB_TOKEN (no external secret needed). History is only pushed on
      # main / merge_group; PR runs just compute the result and comment on
      # regressions, so they never need write access to gh-pages.
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Benchmark
          tool: 'customSmallerIsBetter'
          output-file-path: commet/build/customSmallerIsBetter.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name != 'pull_request' }}
          # Show alert with commit comment on detecting possible performance regression
          alert-threshold: '350%'
          comment-on-alert: true
          fail-on-alert: false
          summary-always: true